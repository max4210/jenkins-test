---
# Template testbed - the actual testbed.yaml is generated at runtime
# by scripts/generate_testbed.py from CML lab data.
#
# This template shows the expected structure for reference.

testbed:
  name: CML-Lab-Template
  credentials:
    default:
      username: admin
      password: admin
    enable:
      password: admin

devices:
  router1:
    os: iosxe
    platform: iosv
    type: router
    connections:
      defaults:
        class: unicon.Unicon
      console:
        protocol: telnet
        ip: 192.168.137.125
        port: "<populated at runtime>"

  router2:
    os: iosxe
    platform: iosv
    type: router
    connections:
      defaults:
        class: unicon.Unicon
      console:
        protocol: telnet
        ip: 192.168.137.125
        port: "<populated at runtime>"

  switch1:
    os: iosxe
    platform: iosvl2
    type: switch
    connections:
      defaults:
        class: unicon.Unicon
      console:
        protocol: telnet
        ip: 192.168.137.125
        port: "<populated at runtime>"
