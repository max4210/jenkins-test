lab:
  description: "Two IOSv routers and one IOSvL2 switch - managed by Jenkins/Terraform"
  notes: "Automated lab for CI/CD testing with pyATS"
  title: "Jenkins-Terraform-Lab"
  version: 0.1.0

nodes:
  - id: n0
    label: router1
    node_definition: iosv
    x: -200
    y: 0
    configuration: |-
      hostname router1
      no ip domain-lookup
      interface GigabitEthernet0/0
       description to-switch1
       ip address 10.0.1.1 255.255.255.0
       no shutdown
      interface GigabitEthernet0/1
       description to-router2
       ip address 10.0.12.1 255.255.255.0
       no shutdown
      interface Loopback0
       ip address 1.1.1.1 255.255.255.255
      ip route 2.2.2.2 255.255.255.255 10.0.12.2
      ip route 10.0.2.0 255.255.255.0 10.0.12.2
      line con 0
       exec-timeout 0 0
      line vty 0 4
       login local
       transport input telnet ssh
      username admin privilege 15 secret admin
      enable secret admin
      ip domain-name lab.local
      crypto key generate rsa modulus 2048
      ip ssh version 2
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/0
        slot: 0
        type: physical
      - id: i2
        label: GigabitEthernet0/1
        slot: 1
        type: physical

  - id: n1
    label: router2
    node_definition: iosv
    x: 200
    y: 0
    configuration: |-
      hostname router2
      no ip domain-lookup
      interface GigabitEthernet0/0
       description to-switch1
       ip address 10.0.2.1 255.255.255.0
       no shutdown
      interface GigabitEthernet0/1
       description to-router1
       ip address 10.0.12.2 255.255.255.0
       no shutdown
      interface Loopback0
       ip address 2.2.2.2 255.255.255.255
      ip route 1.1.1.1 255.255.255.255 10.0.12.1
      ip route 10.0.1.0 255.255.255.0 10.0.12.1
      line con 0
       exec-timeout 0 0
      line vty 0 4
       login local
       transport input telnet ssh
      username admin privilege 15 secret admin
      enable secret admin
      ip domain-name lab.local
      crypto key generate rsa modulus 2048
      ip ssh version 2
    interfaces:
      - id: i0
        label: Loopback0
        type: loopback
      - id: i1
        label: GigabitEthernet0/0
        slot: 0
        type: physical
      - id: i2
        label: GigabitEthernet0/1
        slot: 1
        type: physical

  - id: n2
    label: switch1
    node_definition: iosvl2
    x: 0
    y: 150
    configuration: |-
      hostname switch1
      no ip domain-lookup
      vlan 10
       name ROUTER1
      vlan 20
       name ROUTER2
      interface GigabitEthernet0/0
       description to-router1
       switchport mode access
       switchport access vlan 10
       no shutdown
      interface GigabitEthernet0/1
       description to-router2
       switchport mode access
       switchport access vlan 20
       no shutdown
      interface Vlan10
       ip address 10.0.1.2 255.255.255.0
       no shutdown
      interface Vlan20
       ip address 10.0.2.2 255.255.255.0
       no shutdown
      line con 0
       exec-timeout 0 0
      line vty 0 4
       login local
       transport input telnet ssh
      username admin privilege 15 secret admin
      enable secret admin
      ip domain-name lab.local
      crypto key generate rsa modulus 2048
      ip ssh version 2
    interfaces:
      - id: i0
        label: GigabitEthernet0/0
        slot: 0
        type: physical
      - id: i1
        label: GigabitEthernet0/1
        slot: 1
        type: physical

  - id: n3
    label: ext-conn
    node_definition: external_connector
    x: 0
    y: -150
    configuration: "bridge0"
    interfaces:
      - id: i0
        label: port
        type: physical

links:
  - id: l0
    n1: n0
    i1: i1
    n2: n2
    i2: i0
    label: router1-to-switch1

  - id: l1
    n1: n1
    i1: i1
    n2: n2
    i2: i1
    label: router2-to-switch1

  - id: l2
    n1: n0
    i1: i2
    n2: n1
    i2: i2
    label: router1-to-router2
