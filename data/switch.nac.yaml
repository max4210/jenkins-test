switch:
  type: switch
  hostname: SW1
  vlans:
    - id: 10
      name: DATA
    - id: 20
      name: VOICE
  vlan_interfaces:
    - vlan: 10
      ip: 10.0.1.2
      mask: 255.255.255.0
    - vlan: 20
      ip: 10.0.2.2
      mask: 255.255.255.0
  interfaces:
    - name: GigabitEthernet0/0
      mode: access
      vlan: 10
    - name: GigabitEthernet0/1
      mode: access
      vlan: 20
