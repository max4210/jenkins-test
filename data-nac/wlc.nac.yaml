iosxe:
  devices:
  - name: wlc
    configuration:
      system:
        hostname: WLC1
      vlan:
        vlans:
        - id: 20
          name: WLC-MGMT
        - id: 100
          name: CORPORATE
        - id: 200
          name: GUEST
      interfaces:
        loopbacks:
        - id: 0
          ipv4:
            address: 3.3.3.3
            address_mask: 255.255.255.255
        vlans:
        - id: 20
          ipv4:
            address: 10.0.20.1
            address_mask: 255.255.255.0
        ethernets:
        - type: GigabitEthernet
          id: '1'
          switchport:
            mode: trunk
            trunk_allowed_vlans:
              vlans:
                ids:
                - 20
                - 100
                - 200
        - type: GigabitEthernet
          id: '2'
      routing:
        ospf_processes:
        - id: 1
          router_id: 3.3.3.3
          passive_interface_default: true
          networks:
          - ip: 10.0.20.0
            wildcard: 0.0.0.255
            area: 0
          - ip: 3.3.3.3
            wildcard: 0.0.0.0
            area: 0
