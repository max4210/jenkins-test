iosxe:
  devices:
  - name: switch
    configuration:
      system:
        hostname: SW1
      interfaces:
        loopbacks:
        - id: 0
          ipv4:
            address: 2.2.2.2
            address_mask: 255.255.255.255
        vlans:
        - id: 1
        - id: 100
          ipv4:
            address: 10.0.100.1
            address_mask: 255.255.255.0
        - id: 137
        - id: 200
          ipv4:
            address: 10.0.200.1
            address_mask: 255.255.255.0
        ethernets:
        - type: GigabitEthernet
          id: 0/0
          ipv4:
            address: 10.0.10.2
            address_mask: 255.255.255.0
        - type: GigabitEthernet
          id: 0/1
          description: Trunk to WLC
          ipv4:
            address: 10.0.20.2
            address_mask: 255.255.255.0
        - type: GigabitEthernet
          id: 0/2
          description: Management via bridge0
          switchport:
            mode: trunk
            trunk_native_vlan_id: 137
        - type: GigabitEthernet
          id: 0/3
      routing:
        ospf_processes:
        - id: 1
          router_id: 2.2.2.2
          passive_interface_default: true
          networks:
          - ip: 2.2.2.2
            wildcard: 0.0.0.0
            area: 0
          - ip: 10.0.10.0
            wildcard: 0.0.0.255
            area: 0
          - ip: 10.0.20.0
            wildcard: 0.0.0.255
            area: 0
          - ip: 10.0.100.0
            wildcard: 0.0.0.255
            area: 0
          - ip: 10.0.200.0
            wildcard: 0.0.0.255
            area: 0
